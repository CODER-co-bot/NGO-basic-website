<!DOCTYPE html>
<html lang="en">    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InAmigos Foundation - Gallery</title>
     <style>
        button {
    padding: 10px 20px;
    margin-top: 20px;
    border: none;
    border-radius: 5px;
    background-color: #007BFF;
    color: white;
    cursor: pointer;
}

button:hover {
    background-color: #0056b3;
}
.gallery{
    margin: 100px 0 0 200px;

    width: 70%;
    height: 450px;
    display: flex;
    justify-content: center;
    gap: 10px;
}
.gallery img{
    width: 20%;
    height: 100%;
    object-fit: cover;
    border-radius: 10px;
    border: 2px solid rgba(255, 255, 255, 0.68);
    transition: all ease-in-out 0.5s;
}
.gallery img:hover{
    width: 70%;
}
#gallery h2 {

    color: rgb(120, 73, 137);
    font-size: 40px;
}
    </style>
</head>
<body>
